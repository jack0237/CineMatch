name: Build Android APK
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Install and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK (Local mode in CI)
        run: eas build --platform android --profile preview --non-interactive --local
        env:
          STITCH_API_KEY: ${{ secrets.STITCH_API_KEY }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_TMDB_API_KEY: ${{ secrets.EXPO_PUBLIC_TMDB_API_KEY }}
          EXPO_PUBLIC_TMDB_BASE_URL: ${{ secrets.EXPO_PUBLIC_TMDB_BASE_URL }}
          EXPO_PUBLIC_TMDB_IMAGE_BASE_URL: ${{ secrets.EXPO_PUBLIC_TMDB_IMAGE_BASE_URL }}

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CineMatch-APK
          path: "*.apk"
          retention-days: 7
